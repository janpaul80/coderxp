# ─── CoderXP — Nginx Site Config ─────────────────────────────
#
# Handles:
#   coderxp.app        → canonical HTTPS
#   www.coderxp.app    → 301 redirect to coderxp.app
#   HTTP :80           → 301 redirect to HTTPS
#
# Architecture:
#   /api/*             → proxy → Node.js :3001
#   /socket.io/*       → proxy → Node.js :3001 (WebSocket upgrade)
#   /uploads/*         → proxy → Node.js :3001 (static file serving)
#   /internal/*        → proxy → Node.js :3001 (worker relay)
#   /*                 → serve /var/www/coderxp/dist (React SPA)
#
# Install location: /etc/nginx/sites-available/coderxp.app
# Enable with:      ln -s /etc/nginx/sites-available/coderxp.app /etc/nginx/sites-enabled/
#
# SSL managed by Certbot — do not edit the ssl_certificate lines manually.
# ─────────────────────────────────────────────────────────────

# ─── Upstream: Node.js API + Socket.IO ───────────────────────

upstream coderxp_node {
    server 127.0.0.1:3001;
    keepalive 64;
}

# ─── HTTP → HTTPS redirect (apex + www) ──────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name coderxp.app www.coderxp.app;

    # Let's Encrypt ACME challenge — must NOT be redirected
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Everything else → HTTPS apex
    location / {
        return 301 https://coderxp.app$request_uri;
    }
}

# ─── www → apex redirect (HTTPS) ─────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.coderxp.app;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/coderxp.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coderxp.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://coderxp.app$request_uri;
}

# ─── Main HTTPS server ────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name coderxp.app;

    # ── SSL — managed by Certbot ──────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/coderxp.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coderxp.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;

    # ── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/coderxp.access.log;
    error_log  /var/log/nginx/coderxp.error.log warn;

    # ── Upload size (matches server 10mb JSON + multipart) ────
    client_max_body_size 50m;

    # ── Gzip compression ──────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/woff
        font/woff2;

    # ── Proxy shared settings ─────────────────────────────────
    proxy_http_version  1.1;
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    proxy_set_header    X-Forwarded-Host  $host;

    # ── Socket.IO — WebSocket upgrade ────────────────────────
    # Must come before /api to avoid prefix collision
    location /socket.io/ {
        proxy_pass          http://coderxp_node;

        # WebSocket upgrade headers
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";

        # Long timeouts — socket connections are persistent
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 10s;

        # Disable buffering for real-time events
        proxy_buffering     off;
        proxy_cache         off;
    }

    # ── API routes → Node.js ──────────────────────────────────
    location /api/ {
        proxy_pass          http://coderxp_node;

        # Extended timeout for long-running build operations
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;

        proxy_buffering     on;
        proxy_buffer_size   128k;
        proxy_buffers       4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ── Uploads static files → Node.js ───────────────────────
    location /uploads/ {
        proxy_pass          http://coderxp_node;
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # ── Internal worker relay → Node.js ──────────────────────
    # Only accessible from localhost in production (firewall rule)
    location /internal/ {
        proxy_pass          http://coderxp_node;
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
    }

    # ── Health check → Node.js ────────────────────────────────
    location /health {
        proxy_pass          http://coderxp_node;
        proxy_read_timeout  10s;
        proxy_connect_timeout 5s;
        access_log          off;
    }

    # ── React SPA — static files ──────────────────────────────
    root /var/www/coderxp/dist;
    index index.html;

    # Vite-hashed assets: long cache (1 year)
    location ~* \.(js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
        try_files   $uri =404;
    }

    # SPA fallback — all unmatched routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }
}
